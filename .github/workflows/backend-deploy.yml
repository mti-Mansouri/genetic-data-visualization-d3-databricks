name: Backend Deploy to Cloud Run

on:
  push:
    paths: ['backend/**']
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2


      - name: Configure Docker for Turin
        run: gcloud auth configure-docker europe-west12-docker.pkg.dev --quiet

      - name: Build and Push Container
        run: |
          docker build -t europe-west12-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/nucleus/api:${{ github.sha }} ./backend
          docker push europe-west12-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/nucleus/api:${{ github.sha }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: nucleus-api
          image: europe-west12-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/nucleus/api:${{ github.sha }}
          region: europe-west12
          env_vars: |
            SUPABASE_JWT_SECRET=${{ secrets.SUPABASE_JWT_SECRET }}