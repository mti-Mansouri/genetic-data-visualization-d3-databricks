name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_test:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Opt-in to the newer version
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4 # Specifically set Node version
        with:
          node-version: 24
      - run: npm ci
      - run: npm test
      - run: npm run build