name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22 # Note: Node 24 is very new, 22 is safer for standard environments
          cache: 'npm'
      - run: npm ci
      
      # Step 1: Run Tests first to ensure code is stable
      - name: Run Tests
        run: npm test

      # Step 2: Build ONCE with the Secrets
      - name: Build React App
        run: npm run build
        env:
          VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}

      # Step 3: Deploy the build folder created in Step 2
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_GENETIC_VISUALIZATION }}'
          channelId: live
          projectId: genetic-visualization